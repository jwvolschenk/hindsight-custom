name: Release Installer Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload to, for example v2.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux-x86-64:
    name: Build Linux x86_64 installer
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[installer]" pyinstaller

      - name: Build binary
        run: |
          python -m PyInstaller \
            --onefile \
            --name hindsight-installer-linux-x86_64 \
            --collect-all textual \
            --add-data "install.sh:." \
            --distpath dist \
            --workpath /tmp/hindsight-installer-build \
            --specpath /tmp/hindsight-installer-spec \
            --noconfirm \
            installer/tui.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hindsight-installer-linux-x86_64
          path: dist/hindsight-installer-linux-x86_64

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Hindsight installer binary release."
          gh release upload "$RELEASE_TAG" dist/hindsight-installer-linux-x86_64 --clobber
